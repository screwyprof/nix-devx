services:
  nix-devx:
    # Uncomment if you want to override the service's Dockerfile to one in the .devcontainer 
    # folder. Note that the path of the Dockerfile and context is relative to the *primary* 
    # docker-compose.yml file (the first in the devcontainer.json "dockerComposeFile"
    # array). The sample below assumes your primary file is in the root of your project.
    #
    # build:
    #   context: .
    #   dockerfile: .devcontainer/Dockerfile
    # https://github.com/cachix/devenv/blob/main/containers/devcontainer/Dockerfile
    image: ghcr.io/cachix/devenv/devcontainer
    # https://code.claude.com/docs/en/settings#environment-variables
    environment:
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-glm-5}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-glm-4.7}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-glm-4.7}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-glm-4.5-air}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.z.ai/api/anthropic}
      - CLAUDE_CONFIG_DIR=/home/vscode/.claude
    volumes:
      - ..:/workspaces:cached
      - nix-store:/nix
      - claude-data:/home/vscode/.claude

    # Uncomment the next four lines if you will use a ptrace-based debugger like C++, Go, and Rust.
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp:unconfined

    # Overrides default command so things don't shut down after the process ends.
    #entrypoint: ["/nix-entrypoint.sh"]
    #command: sleep infinity
 

volumes:
  nix-store:
  claude-data:
